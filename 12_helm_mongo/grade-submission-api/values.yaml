# Default values for grade-submission-api Helm chart

# Namespace
namespace: grade-submission

# Replica count
replicaCount: 3

# stateless-v4: uses MONGODB_URI (full connection string — supports replica set)
image:
  repository: rslim087/kubernetes-course-grade-submission-api
  tag: stateless-v4
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 50%
    maxSurge: 1

# Resource requests and limits
resources:
  requests:
    memory: '48Mi'
    cpu: '70m'
  limits:
    memory: '96Mi'

# Container port
containerPort: 5001

# Health probes
livenessProbe:
  enabled: true
  path: /healthz
  port: 3000
  initialDelaySeconds: 15
  periodSeconds: 5

readinessProbe:
  enabled: true
  path: /readyz
  port: 3000
  periodSeconds: 5

config: {}

# Secret data (base64 encoded)
# Replica set URI (default — matches mongodb/values.yaml auth + headless hosts + rs0):
# Plain URI:
# mongodb://admin:password123@mongodb-0.mongodb-headless.grade-submission.svc.cluster.local:27017,mongodb-1.mongodb-headless.grade-submission.svc.cluster.local:27017,mongodb-2.mongodb-headless.grade-submission.svc.cluster.local:27017/?replicaSet=rs0
# Optional read from secondaries (re-encode if you enable):
# mongodb://admin:password123@mongodb-0.mongodb-headless.grade-submission.svc.cluster.local:27017,mongodb-1.mongodb-headless.grade-submission.svc.cluster.local:27017,mongodb-2.mongodb-headless.grade-submission.svc.cluster.local:27017/?replicaSet=rs0&readPreference=secondaryPreferred
# Standalone fallback (single service mongodb):
# mongodb://admin:password123@mongodb:27017/
secrets:
  MONGODB_URI: 

# Labels
labels:
  app.kubernetes.io/name: grade-submission
  app.kubernetes.io/component: backend
