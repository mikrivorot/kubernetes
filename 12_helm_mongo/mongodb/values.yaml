useStatefulSet: true

# Must match API secrets (MONGODB_USER / MONGODB_PASSWORD in grade-submission-api/values.yaml).
# Requires fresh PVC if mongo was previously installed with auth.enabled: false.
auth:
  enabled: true
  rootUser: admin
  rootPassword: password123

# Install with release name "mongodb" in grade-submission so Service DNS is "mongodb" (same as 11_helm).
# This is NOT the Helm chart — chart is still bitnami/mongodb --version 15.6.13.
# Bitnami removed versioned images from docker.io/bitnami; use bitnamilegacy instead.
image:
  repository: bitnamilegacy/mongodb   # docker.io/bitnamilegacy/mongodb
  tag: 7.0.12-debian-12-r0           # image tag, not helm chart version
