# Bitnami MongoDB — replica set (1 primary + 2 secondaries)
# Chart: bitnami/mongodb (tested with 19.1.14 — check latest: helm search repo bitnami/mongodb --versions)
# Install: helm install mongodb bitnami/mongodb --version 19.1.14 -f values.yaml -n grade-submission --create-namespace

# replicaset → chart always uses StatefulSet (useStatefulSet is only for architecture=standalone)
architecture: replicaset
replicaCount: 3

# 3 data nodes — disable Bitnami default arbiter
arbiter:
  enabled: false

# Must match grade-submission-api secrets.MONGODB_URI (admin / password123)
auth:
  enabled: true
  rootUser: admin
  rootPassword: password123

# Uses default chart image (no bitnamilegacy override). OrderedReady bootstrap works on chart 19.x.
