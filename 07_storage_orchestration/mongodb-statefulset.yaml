apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: grade-submission
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: mongodb
  serviceName: mongodb ## mongodb-0 and mongodb-1 will be created
  replicas: 1
  # the pod template provide a scheleton upon which each pod will be created
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grade-submission
        app.kubernetes.io/component: database # role
        app.kubernetes.io/instance: mongodb # instance bindes to a corresponding StatefulSet
    # runtime requirements for each pod
    spec:
      containers:
        - name: mongodb
          image: mongo:4.4
          ports:
            - containerPort: 27017
              name: web
          # k8s, please mount the persistent volumes (you've found for PCV using part volumeClaimTemplates) to the corresponding pod as local directory mountPath
          volumeMounts:
            - name: mongodb-persistent-storage # pod name
              mountPath: /data/db
  # provides a template for the volumes to be created
  volumeClaimTemplates:
    - metadata:
        name: mongodb-persistent-storage
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 1Gi
